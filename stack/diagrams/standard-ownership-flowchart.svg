<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 1300"
     font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', 'Segoe UI', sans-serif">
  <style>
    :root {
      --fg: #111827; --fg-muted: #6b7280; --fg-soft: #9ca3af;
      --bg: #ffffff; --divider: #d1d5db;
      --ai-bg: #eff6ff; --ai-stroke: #3b82f6; --ai-text: #1e3a8a;
      --human-bg: #fff7ed; --human-stroke: #f97316; --human-text: #7c2d12;
      --collab-bg: #faf5ff; --collab-stroke: #a855f7; --collab-text: #581c87;
      --phase-pill: #f3f4f6; --phase-pill-stroke: #d1d5db; --phase-text: #374151;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --fg: #f3f4f6; --fg-muted: #9ca3af; --fg-soft: #6b7280;
        --bg: #0b0f17; --divider: #4b5563;
        --ai-bg: #172554; --ai-stroke: #60a5fa; --ai-text: #dbeafe;
        --human-bg: #431407; --human-stroke: #fb923c; --human-text: #fed7aa;
        --collab-bg: #3b0764; --collab-stroke: #c084fc; --collab-text: #e9d5ff;
        --phase-pill: #1f2937; --phase-pill-stroke: #374151; --phase-text: #d1d5db;
      }
    }
    .bg { fill: var(--bg); }
    .title { font-size: 18px; font-weight: 600; fill: var(--fg); }
    .subtitle { font-size: 12px; fill: var(--fg-muted); }
    .legend-text { font-size: 11px; fill: var(--fg); }
    .phase-divider { stroke: var(--divider); stroke-width: 1; stroke-dasharray: 3,3; }
    .phase-pill { fill: var(--phase-pill); stroke: var(--phase-pill-stroke); stroke-width: 1; }
    .phase-label { font-size: 11px; font-weight: 600; fill: var(--phase-text); letter-spacing: 0.06em; }
    .lane-header { font-size: 10px; font-weight: 700; fill: var(--fg-soft); letter-spacing: 0.12em; }
    .lane-divider { stroke: var(--divider); stroke-width: 1; stroke-dasharray: 2,4; }
    .box-ai     { fill: var(--ai-bg); stroke: var(--ai-stroke); stroke-width: 1.3; }
    .box-human  { fill: var(--human-bg); stroke: var(--human-stroke); stroke-width: 1.3; }
    .box-collab { fill: var(--collab-bg); stroke: var(--collab-stroke); stroke-width: 1.3; }
    .text-ai     { font-size: 12px; font-weight: 500; fill: var(--ai-text); }
    .text-human  { font-size: 12px; font-weight: 500; fill: var(--human-text); }
    .text-collab { font-size: 12px; font-weight: 500; fill: var(--collab-text); }
    .num-ai     { font-size: 10px; font-weight: 700; fill: var(--ai-stroke); }
    .num-human  { font-size: 10px; font-weight: 700; fill: var(--human-stroke); }
    .num-collab { font-size: 10px; font-weight: 700; fill: var(--collab-stroke); }
    .arrow { stroke: var(--fg-soft); stroke-width: 1.3; fill: none; stroke-linecap: round; }
    .arrow-head { fill: var(--fg-soft); stroke: none; }
    .footnote { font-size: 10px; fill: var(--fg-muted); }
  </style>

  <rect class="bg" width="100%" height="100%"/>

  <!-- Title -->
  <text class="title" x="60" y="42">STANDARD.md · Ownership Flow</text>
  <text class="subtitle" x="60" y="62">landing 早做 · 首次 deploy 早触发 · Stripe 独立 · 每 Phase 完都 push</text>

  <!-- Legend -->
  <g>
    <rect class="box-ai" x="60" y="78" width="14" height="14" rx="3"/>
    <text class="legend-text" x="80" y="89">AI 做</text>
    <rect class="box-human" x="130" y="78" width="14" height="14" rx="3"/>
    <text class="legend-text" x="150" y="89">Human 做</text>
    <rect class="box-collab" x="220" y="78" width="14" height="14" rx="3"/>
    <text class="legend-text" x="240" y="89">协作</text>
  </g>

  <!-- Lane headers -->
  <text class="lane-header" x="195" y="114" text-anchor="middle">AI LANE</text>
  <text class="lane-header" x="485" y="114" text-anchor="middle">HUMAN LANE</text>

  <!-- Lane divider full length -->
  <line class="lane-divider" x1="340" y1="124" x2="340" y2="1268"/>

  <!-- ═══════ PHASE 0 label ═══════ -->
  <line class="phase-divider" x1="60" y1="138" x2="250" y2="138"/>
  <rect class="phase-pill" x="252" y="125" width="176" height="26" rx="13"/>
  <text class="phase-label" x="340" y="142" text-anchor="middle">PHASE 0 · BOOTSTRAP</text>
  <line class="phase-divider" x1="430" y1="138" x2="620" y2="138"/>

  <!-- 01 Human: PLAYBOOK_TOKEN -->
  <rect class="box-human" x="360" y="162" width="260" height="32" rx="6"/>
  <text class="num-human"  x="370" y="178">01</text>
  <text class="text-human" x="370" y="190">GitHub Secrets → PLAYBOOK_TOKEN（30s）</text>

  <!-- arrow 01 → Phase 1 label (H → down) -->
  <path class="arrow" d="M 485 194 L 485 208"/>

  <!-- ═══════ PHASE 1 label ═══════ -->
  <line class="phase-divider" x1="60" y1="218" x2="226" y2="218"/>
  <rect class="phase-pill" x="228" y="205" width="224" height="26" rx="13"/>
  <text class="phase-label" x="340" y="222" text-anchor="middle">PHASE 1 · SCAFFOLD + LANDING 壳</text>
  <line class="phase-divider" x1="454" y1="218" x2="620" y2="218"/>

  <!-- arrow from phase 1 label to node 02 (cross H→AI) -->
  <path class="arrow" d="M 485 231 L 485 240 L 195 240 L 195 248"/>
  <polygon class="arrow-head" points="195,254 191,247 199,247"/>

  <!-- 02 AI: Scaffold + cleanup + deps -->
  <rect class="box-ai" x="60" y="254" width="260" height="32" rx="6"/>
  <text class="num-ai"  x="70" y="270">02</text>
  <text class="text-ai" x="70" y="282">Scaffold + §2.5 清理 + deps</text>

  <!-- arrow 02 → 03 (AI → AI vertical) -->
  <path class="arrow" d="M 195 286 L 195 294"/>
  <polygon class="arrow-head" points="195,300 191,293 199,293"/>

  <!-- 03 AI: landing -->
  <rect class="box-ai" x="60" y="300" width="260" height="32" rx="6"/>
  <text class="num-ai"  x="70" y="316">03</text>
  <text class="text-ai" x="70" y="328">写 app/page.tsx landing 页（真设计）</text>

  <!-- arrow 03 → 04 (AI → Human diagonal) -->
  <path class="arrow" d="M 195 332 L 195 340 L 485 340 L 485 348"/>
  <polygon class="arrow-head" points="485,354 481,347 489,347"/>

  <!-- 04 Human: Supabase keys -->
  <rect class="box-human" x="360" y="354" width="260" height="32" rx="6"/>
  <text class="num-human"  x="370" y="370">04</text>
  <text class="text-human" x="370" y="382">Supabase keys → .env.local</text>

  <!-- arrow 04 → Phase 2 label -->
  <path class="arrow" d="M 485 386 L 485 400"/>

  <!-- ═══════ PHASE 2 label ═══════ -->
  <line class="phase-divider" x1="60" y1="410" x2="196" y2="410"/>
  <rect class="phase-pill" x="198" y="397" width="284" height="26" rx="13"/>
  <text class="phase-label" x="340" y="414" text-anchor="middle">PHASE 2 · 首次 VERCEL 部署 🔑</text>
  <line class="phase-divider" x1="484" y1="410" x2="620" y2="410"/>

  <!-- arrow from Phase 2 label to node 05 (H vertical) -->
  <path class="arrow" d="M 485 423 L 485 436"/>
  <polygon class="arrow-head" points="485,442 481,435 489,435"/>

  <!-- 05 Human: Vercel import + paste env + deploy -->
  <rect class="box-human" x="360" y="442" width="260" height="32" rx="6"/>
  <text class="num-human"  x="370" y="458">05</text>
  <text class="text-human" x="370" y="470">Vercel Import + Paste .env + Deploy</text>

  <!-- arrow 05 → 06 (H → H vertical) -->
  <path class="arrow" d="M 485 474 L 485 482"/>
  <polygon class="arrow-head" points="485,488 481,481 489,481"/>

  <!-- 06 Human: runtime test -->
  <rect class="box-human" x="360" y="488" width="260" height="32" rx="6"/>
  <text class="num-human"  x="370" y="504">06</text>
  <text class="text-human" x="370" y="516">打开线上 URL 实测 landing 渲染</text>

  <!-- arrow 06 → Phase 3 label -->
  <path class="arrow" d="M 485 520 L 485 534"/>

  <!-- ═══════ PHASE 3 label ═══════ -->
  <line class="phase-divider" x1="60" y1="544" x2="240" y2="544"/>
  <rect class="phase-pill" x="242" y="531" width="196" height="26" rx="13"/>
  <text class="phase-label" x="340" y="548" text-anchor="middle">PHASE 3 · DB + AUTH</text>
  <line class="phase-divider" x1="440" y1="544" x2="620" y2="544"/>

  <!-- arrow Phase 3 label → node 07 (cross H→AI) -->
  <path class="arrow" d="M 485 557 L 485 566 L 195 566 L 195 574"/>
  <polygon class="arrow-head" points="195,580 191,573 199,573"/>

  <!-- 07 AI: supabase + middleware + auth + schema -->
  <rect class="box-ai" x="60" y="580" width="260" height="32" rx="6"/>
  <text class="num-ai"  x="70" y="596">07</text>
  <text class="text-ai" x="70" y="608">supabase clients + middleware + auth + schema</text>

  <!-- arrow 07 → 08 (AI → Human diagonal) -->
  <path class="arrow" d="M 195 612 L 195 620 L 485 620 L 485 628"/>
  <polygon class="arrow-head" points="485,634 481,627 489,627"/>

  <!-- 08 Human: Supabase Dashboard -->
  <rect class="box-human" x="360" y="634" width="260" height="32" rx="6"/>
  <text class="num-human"  x="370" y="650">08</text>
  <text class="text-human" x="370" y="662">Supabase Dashboard: Email off + OAuth</text>

  <!-- arrow 08 → 09 (H → H vertical) -->
  <path class="arrow" d="M 485 666 L 485 674"/>
  <polygon class="arrow-head" points="485,680 481,673 489,673"/>

  <!-- 09 Human: Google OAuth Client + Supabase keys -->
  <rect class="box-human" x="360" y="680" width="260" height="32" rx="6"/>
  <text class="num-human"  x="370" y="696">09</text>
  <text class="text-human" x="370" y="708">Google OAuth Client → Supabase 粘 keys</text>

  <!-- arrow 09 → 10 (H → AI diagonal) -->
  <path class="arrow" d="M 485 712 L 485 720 L 195 720 L 195 728"/>
  <polygon class="arrow-head" points="195,734 191,727 199,727"/>

  <!-- 10 AI: git push -->
  <rect class="box-ai" x="60" y="734" width="260" height="32" rx="6"/>
  <text class="num-ai"  x="70" y="750">10</text>
  <text class="text-ai" x="70" y="762">git push → Vercel 自动 redeploy</text>

  <!-- arrow 10 → 11 (AI → Human diagonal) -->
  <path class="arrow" d="M 195 766 L 195 774 L 485 774 L 485 782"/>
  <polygon class="arrow-head" points="485,788 481,781 489,781"/>

  <!-- 11 Human: browser auth E2E -->
  <rect class="box-human" x="360" y="788" width="260" height="32" rx="6"/>
  <text class="num-human"  x="370" y="804">11</text>
  <text class="text-human" x="370" y="816">浏览器实测 Email + Google + middleware</text>

  <!-- arrow 11 → Phase 4 label -->
  <path class="arrow" d="M 485 820 L 485 834"/>

  <!-- ═══════ PHASE 4 label ═══════ -->
  <line class="phase-divider" x1="60" y1="844" x2="196" y2="844"/>
  <rect class="phase-pill" x="198" y="831" width="284" height="26" rx="13"/>
  <text class="phase-label" x="340" y="848" text-anchor="middle">PHASE 4 · STRIPE（可选）</text>
  <line class="phase-divider" x1="484" y1="844" x2="620" y2="844"/>

  <!-- arrow from Phase 4 label to node 12 (cross H→AI) -->
  <path class="arrow" d="M 485 857 L 485 866 L 195 866 L 195 874"/>
  <polygon class="arrow-head" points="195,880 191,873 199,873"/>

  <!-- 12 AI: /api/stripe/{checkout,webhook} -->
  <rect class="box-ai" x="60" y="880" width="260" height="32" rx="6"/>
  <text class="num-ai"  x="70" y="896">12</text>
  <text class="text-ai" x="70" y="908">/api/stripe/{checkout,webhook}</text>

  <!-- arrow 12 → 13 (AI → Human diagonal) -->
  <path class="arrow" d="M 195 912 L 195 920 L 485 920 L 485 928"/>
  <polygon class="arrow-head" points="485,934 481,927 489,927"/>

  <!-- 13 Human: Stripe Dashboard Product + keys → Vercel env -->
  <rect class="box-human" x="360" y="934" width="260" height="32" rx="6"/>
  <text class="num-human"  x="370" y="950">13</text>
  <text class="text-human" x="370" y="962">Stripe Dashboard: Product + keys → Vercel</text>

  <!-- arrow 13 → 14 (H → H vertical) -->
  <path class="arrow" d="M 485 966 L 485 974"/>
  <polygon class="arrow-head" points="485,980 481,973 489,973"/>

  <!-- 14 Human: test mode 付款实测 -->
  <rect class="box-human" x="360" y="980" width="260" height="32" rx="6"/>
  <text class="num-human"  x="370" y="996">14</text>
  <text class="text-human" x="370" y="1008">Stripe test mode 付款实测（test card 4242…）</text>

  <!-- arrow 14 → 15 (H → H vertical) -->
  <path class="arrow" d="M 485 1012 L 485 1020"/>
  <polygon class="arrow-head" points="485,1026 481,1019 489,1019"/>

  <!-- 15 Human: 生产 Webhook → secret → redeploy -->
  <rect class="box-human" x="360" y="1026" width="260" height="32" rx="6"/>
  <text class="num-human"  x="370" y="1042">15</text>
  <text class="text-human" x="370" y="1054">生产 Webhook → secret → Vercel redeploy</text>

  <!-- arrow 15 → Phase 5-N label -->
  <path class="arrow" d="M 485 1058 L 485 1072"/>

  <!-- ═══════ PHASE 5-N label ═══════ -->
  <line class="phase-divider" x1="60" y1="1082" x2="196" y2="1082"/>
  <rect class="phase-pill" x="198" y="1069" width="284" height="26" rx="13"/>
  <text class="phase-label" x="340" y="1086" text-anchor="middle">PHASE 5-N · 业务逻辑（循环）</text>
  <line class="phase-divider" x1="484" y1="1082" x2="620" y2="1082"/>

  <!-- arrow Phase 5-N label → node 16 (cross H→AI) -->
  <path class="arrow" d="M 485 1095 L 485 1104 L 195 1104 L 195 1112"/>
  <polygon class="arrow-head" points="195,1118 191,1111 199,1111"/>

  <!-- 16 AI: 写本 phase 代码 -->
  <rect class="box-ai" x="60" y="1118" width="260" height="32" rx="6"/>
  <text class="num-ai"  x="70" y="1134">16</text>
  <text class="text-ai" x="70" y="1146">写本 phase 代码（一个业务功能）</text>

  <!-- arrow 16 → 17 (AI → AI vertical) -->
  <path class="arrow" d="M 195 1150 L 195 1158"/>
  <polygon class="arrow-head" points="195,1164 191,1157 199,1157"/>

  <!-- 17 AI: git push → Vercel redeploy -->
  <rect class="box-ai" x="60" y="1164" width="260" height="32" rx="6"/>
  <text class="num-ai"  x="70" y="1180">17</text>
  <text class="text-ai" x="70" y="1192">git push → Vercel 自动 redeploy</text>

  <!-- arrow 17 → 18 (AI → Human diagonal) -->
  <path class="arrow" d="M 195 1196 L 195 1204 L 485 1204 L 485 1212"/>
  <polygon class="arrow-head" points="485,1218 481,1211 489,1211"/>

  <!-- 18 Human: 浏览器走本 phase user flow -->
  <rect class="box-human" x="360" y="1218" width="260" height="32" rx="6"/>
  <text class="num-human"  x="370" y="1234">18</text>
  <text class="text-human" x="370" y="1246">浏览器走本 phase user flow</text>

  <!-- Loop arrow: node 18 → back to node 16 (dashed, around right edge) -->
  <path class="arrow" stroke-dasharray="4,3" d="M 620 1234 L 652 1234 L 652 1134 L 324 1134"/>
  <polygon class="arrow-head" points="324,1134 331,1130 331,1138"/>
  <text class="footnote" x="540" y="1128" text-anchor="middle">↻ 每个业务 phase 重复</text>

  <text class="footnote" x="60" y="1290">* 协作紫色节点典型场景：Supabase-only 模式里 AI 写建表 SQL，Human 粘到 SQL Editor；或 AI 调 `npm run db:types` 前 Human 先 `npx supabase login`。</text>
</svg>
